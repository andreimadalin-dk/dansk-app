<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indfødsretsprøven — Studievejledning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css?v=6">
  <link rel="stylesheet" href="css/app.css?v=6">
</head>
<body>

  <nav class="top-nav">
    <a href="index.html" class="top-nav__title">Indfødsretsprøven</a>
    <div class="top-nav__right">
      <div id="authWidget"></div>
    </div>
  </nav>

  <div class="hero">
    <h1 class="hero__title">Indfødsretsprøven</h1>
    <p class="hero__subtitle">Studievejledning</p>
    <a href="#chapters" class="btn btn--coral" id="startBtn">Begynd at lære</a>
  </div>

  <div class="page-container">

    <!-- Stats Row -->
    <div class="section-header">Din fremgang</div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-card__label">Afsnit læst</div>
        <div class="stat-card__value" id="statSections">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Quiz-score</div>
        <div class="stat-card__value" id="statQuiz">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Kort mestret</div>
        <div class="stat-card__value" id="statCards">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Studiestreak</div>
        <div class="stat-card__value" id="statStreak">0</div>
      </div>
    </div>

    <!-- Chapter Grid -->
    <div class="section-header" id="chapters" style="margin-top: 32px;">Kapitler</div>
    <div class="chapter-grid" id="chapterGrid"></div>

  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script src="data/chapters.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/app.js?v=4"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      // Update stats
      var stats = DanskProgress.getOverallStats();
      document.getElementById('statSections').textContent = stats.sectionsRead + '/' + stats.sectionsTotal;
      document.getElementById('statQuiz').textContent = stats.quizAttempted > 0
        ? Math.round((stats.quizCorrect / stats.quizAttempted) * 100) + '%'
        : '—';
      document.getElementById('statCards').textContent = stats.flashcardsMastered;
      document.getElementById('statStreak').textContent = stats.streak + 'd';

      // Render chapter cards
      var grid = document.getElementById('chapterGrid');
      var html = '';

      DANSK_CHAPTERS.forEach(function(ch) {
        var prog = DanskProgress.getChapterProgress(ch.id);
        var pct = prog.total > 0 ? Math.round((prog.read / prog.total) * 100) : 0;

        html += '<div class="card">' +
          '<div class="card__body" style="padding: 16px;">' +
            '<div class="chapter-card__number">Kapitel ' + ch.number + '</div>' +
            '<div class="chapter-card__title-da">' + DanskApp.escapeHtml(ch.titleDa) + '</div>' +
            '<div class="chapter-card__progress">' +
              '<div class="progress-bar"><div class="progress-bar__fill" style="width:' + pct + '%"></div></div>' +
              '<span>' + prog.read + '/' + prog.total + '</span>' +
            '</div>' +
            '<div class="chapter-card__actions">' +
              '<a href="study.html?chapter=' + ch.id + '" class="btn btn--outlined btn--sm">Læs</a>' +
              '<a href="reels.html?chapter=' + ch.id + '" class="btn btn--outlined btn--sm">Reels</a>' +
              '<a href="quiz.html?chapter=' + ch.id + '" class="btn btn--outlined btn--sm">Quiz</a>' +
              '<a href="flashcards.html?chapter=' + ch.id + '" class="btn btn--outlined btn--sm">Flashkort</a>' +
            '</div>' +
          '</div>' +
        '</div>';
      });

      grid.innerHTML = html;


      // Start Learning button -> first unfinished chapter
      document.getElementById('startBtn').addEventListener('click', function(e) {
        e.preventDefault();
        for (var i = 0; i < DANSK_CHAPTERS.length; i++) {
          var prog = DanskProgress.getChapterProgress(DANSK_CHAPTERS[i].id);
          if (prog.read < prog.total) {
            window.location.href = 'study.html?chapter=' + DANSK_CHAPTERS[i].id;
            return;
          }
        }
        window.location.href = 'study.html?chapter=ch1';
      });
    })();
  </script>

</body>
</html>
