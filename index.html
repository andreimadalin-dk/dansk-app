<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indfødsretsprøven — Studievejledning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css?v=12">
  <link rel="stylesheet" href="css/app.css?v=12">
  <style>
    /* Keep top-nav hidden on the dashboard — header lives inside .home-shell */
    body { background: var(--bg); }
    .home-shell > .home-header .auth-widget__avatar { border-color: var(--border-dark); }
  </style>
</head>
<body>

  <div class="home-shell">
    <header class="home-header">
      <a href="landing.html" class="logo" aria-label="Indfødsretsprøven — forside">
        <span class="logo__text">DCT</span>
        <span class="logo__stack" aria-hidden="true">
          <!-- Globe icon (top) -->
          <svg class="logo__globe" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#logoGlobeClip)">
              <circle cx="7" cy="7" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M7 0.328125V13.6719" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M0.328125 7H13.6719" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M7 0.328125C8.66927 2.12348 9.60938 4.50991 9.60938 7C9.60938 9.49009 8.66927 11.8765 7 13.6719" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M7 0.328125C5.33073 2.12348 4.39062 4.50991 4.39062 7C4.39062 9.49009 5.33073 11.8765 7 13.6719" stroke="#2D2A22" stroke-width="0.65625"/>
            </g>
            <defs>
              <clipPath id="logoGlobeClip"><rect width="14" height="14"/></clipPath>
            </defs>
          </svg>
          <!-- Two-half composition: outlined dome (top) + filled dome flipped (bottom) -->
          <svg class="logo__halves" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 0.388672C10.5207 0.388672 13.3974 3.14106 13.5986 6.61133H0.401367C0.602589 3.14106 3.47928 0.388672 7 0.388672Z" stroke="#2D2A22" stroke-width="0.777778"/>
            <path d="M7 14C3.13401 14 0 10.866 0 7H14C14 10.866 10.866 14 7 14Z" fill="#2D2A22"/>
          </svg>
          <!-- DK circle (bottom) -->
          <span class="logo__dk">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
              <circle cx="7" cy="7" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
            </svg>
            <span class="logo__dk-text">DK</span>
          </span>
        </span>
      </a>
      <div class="home-header__right">
        <div id="authWidget"></div>
        <a href="landing.html" class="home-menu" aria-label="Gå til forsiden">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
            <path d="M1 1H17M1 7H17M1 13H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </a>
      </div>
    </header>

    <div class="home-layout">
      <aside class="home-col home-col--progress">
        <h2 class="home-sectionLabel">Din fremgang</h2>
        <div class="stat-stack" id="statStack">
          <div class="stat-tile">
            <span class="stat-tile__label">Afsnit læst</span>
            <span class="stat-tile__value" id="statSections">0/0</span>
          </div>
          <div class="stat-tile">
            <span class="stat-tile__label">Quiz-score</span>
            <span class="stat-tile__value" id="statQuiz">—</span>
          </div>
          <div class="stat-tile">
            <span class="stat-tile__label">Kort mestret</span>
            <span class="stat-tile__value" id="statCards">0</span>
          </div>
          <div class="stat-tile">
            <span class="stat-tile__label">Studiestreak</span>
            <span class="stat-tile__value" id="statStreak">0d</span>
          </div>
        </div>
      </aside>

      <section class="home-col home-col--chapters">
        <h2 class="home-sectionLabel">Kapitler</h2>
        <div class="chapter-list" id="chapterList"></div>
      </section>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script src="data/chapters.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/app.js?v=5"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    (function() {
      // === Stats ===
      var stats = DanskProgress.getOverallStats();
      document.getElementById('statSections').textContent =
        stats.sectionsRead + '/' + stats.sectionsTotal;
      document.getElementById('statQuiz').textContent = stats.quizAttempted > 0
        ? Math.round((stats.quizCorrect / stats.quizAttempted) * 100) + '%'
        : '—';
      document.getElementById('statCards').textContent = stats.flashcardsMastered;
      document.getElementById('statStreak').textContent = stats.streak + 'd';

      // === Chapter rows ===
      var CHAPTER_BLURBS = {
        ch1: 'Danmarks historie strækker sig fra de første bosættelser efter istiden til vikingetid, middelalder og moderne demokrati — et samlet rige formet af krig, reformer og kultur.',
        ch2: 'Danmarks demokrati blev grundlagt med Grundloven i 1849, hvor enevælden blev afskaffet. Siden har demokratiet udviklet sig med flere rettigheder og større indflydelse til borgerne.',
        ch3: 'Den danske økonomi bygger på velfærdsstaten, høj beskæftigelse og et stærkt erhvervsliv. Flexicurity-modellen balancerer tryghed for lønmodtagere med fleksibilitet for virksomheder.',
        ch4: 'Danmark er medlem af EU, NATO og FN og spiller en aktiv rolle i international politik. Udenrigspolitikken bygger på samarbejde, menneskerettigheder og grøn omstilling.',
        ch5: 'Dansk kulturliv spænder fra H.C. Andersen og Søren Kierkegaard til moderne arkitektur, film og design. Folkeoplysning og foreningsliv har formet nationens identitet.',
        ch6: 'Tværgående temaopslag om ligestilling, bæredygtighed, medier og religion — bindeledet mellem historie, politik og nutid, som samler centrale emner til prøven.'
      };

      var list = document.getElementById('chapterList');
      var html = '';

      DANSK_CHAPTERS.forEach(function(ch, idx) {
        var prog = DanskProgress.getChapterProgress(ch.id);
        var pct = prog.total > 0 ? Math.round((prog.read / prog.total) * 100) : 0;
        var num = String(ch.number).padStart(2, '0');
        var desc = CHAPTER_BLURBS[ch.id] || ch.summaryDa || '';

        html +=
          '<article class="chapter-row">' +
            '<div class="chapter-row__num">' + num + '</div>' +
            '<div class="chapter-row__body">' +
              '<h3 class="chapter-row__title">' + DanskApp.escapeHtml(ch.titleDa) + '</h3>' +
              (desc
                ? '<p class="chapter-row__desc">' + DanskApp.escapeHtml(desc) + '</p>'
                : '') +
              '<div class="chapter-row__foot">' +
                '<div class="chapter-row__progress">' +
                  '<div class="chapter-row__progress-labels">' +
                    '<span>Progress</span>' +
                    '<span>' + prog.read + '/' + prog.total + '</span>' +
                  '</div>' +
                  '<div class="progress-bar"><div class="progress-bar__fill" style="width:' + pct + '%"></div></div>' +
                '</div>' +
                '<div class="chapter-row__actions">' +
                  '<a href="study.html?chapter=' + ch.id + '" class="btn-pill btn-pill--primary">Start</a>' +
                  '<div class="chapter-row__links">' +
                    '<a href="reels.html?chapter=' + ch.id + '">Reels</a>' +
                    '<a href="quiz.html?chapter=' + ch.id + '">Quiz</a>' +
                    '<a href="flashcards.html?chapter=' + ch.id + '">Flashkort</a>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</article>';
      });

      list.innerHTML = html;
    })();
  </script>

</body>
</html>
