<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapters — Danish Citizenship Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'PP Acma';
      font-weight: 600;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Semibold.otf') format('opentype'),
           url('fonts/PPAcma-Semibold.ttf') format('truetype');
    }

    :root {
      --bg: #fffaf5;
      --fg: #382626;
      /* Card / CTA tokens — sampled directly from Figma 603:556. */
      --card-bg:      #f1e7dd;
      --card-portrait-bg: #ddcfc2;
      --card-number:  #382626;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { min-height: 100vh; overflow-x: hidden; }

    /* Mirrors Figma "Chapters" (603:556): vertical SPACE_BETWEEN with
       padding T20 R20 B20 L16, centred. Header / page-title / grid stacked. */
    .chapters-page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ---------- Page header (title + subtitle) ----------
       Centered "Chapters" 50px PP Acma + 16px sub copy under it. */
    .chapters-header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      text-align: center;
      margin-top: 12px;
    }
    .chapters-title {
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: 50px;
      line-height: 1.1;
      color: #000;
      max-width: 726px;
    }
    .chapters-subtitle {
      font-family: 'Inter', 'SuisseIntl', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.2;
      color: rgba(56, 38, 38, 0.8);
      max-width: 397px;
    }

    /* ---------- Chapter grid ----------
       margin-top: auto pushes the grid to the bottom of the flex column
       wrapper, so the cards sit 20px from the viewport bottom (matching
       the wrapper's padding-bottom and the FAB inset on other pages). */
    .chapters-grid {
      width: 100%;
      max-width: 1462px;
      margin: auto auto 0;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 20px;
      align-items: end;
      justify-items: center;
    }

    /* ---------- Chapter card ---------- */
    .kapitel-card {
      container-type: inline-size;
      container-name: kapitel;
      width: 100%;
      max-width: 227px;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* Arched peach panel (Figma 227×539, radius 160/160/10/10). */
    .kapitel-card__main {
      position: relative;
      width: 100%;
      aspect-ratio: 227 / 539;
      background: var(--card-bg);
      border-radius:
        70.5% 70.5% 4.4% 4.4% /
        29.7% 29.7% 1.85% 1.85%;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .kapitel-card__portrait {
      position: absolute;
      top: 2.6%;
      left: 7.05%;
      width: 86.34%;
      height: 50.83%;
      border-radius: 50%;
      background: var(--card-portrait-bg);
      overflow: hidden;
    }
    /* Each ch{N}.png is already the rendered Figma crop at 196×274 (the
       oval shape), so the image just fills the portrait window. */
    .kapitel-card__portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .kapitel-card__title {
      position: absolute;
      top: 61.04%;
      left: 7.93%;
      width: 85.46%;
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: clamp(14px, 10.57cqi, 24px);  /* Figma 24/227 = 10.57% */
      line-height: 1.1;
      color: #000;
    }

    /* "Kapitel" label — Figma 754:149 (10px SuisseIntl Book, opacity 0.5). */
    .kapitel-card__label {
      position: absolute;
      top: 90.17%;             /* 486/539 */
      left: 7.05%;             /* 16/227 */
      width: 70.93%;
      font-family: 'Inter', 'SuisseIntl', sans-serif;
      font-weight: 400;
      font-size: clamp(8px, 4.41cqi, 10px);
      line-height: normal;
      color: #000;
      opacity: 0.5;
    }

    /* Chapter number — Figma 24px PP Acma. */
    .kapitel-card__number {
      position: absolute;
      top: 93.32%;             /* 503/539 */
      left: 7.05%;
      width: 86.34%;
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: clamp(14px, 10.57cqi, 24px);
      line-height: normal;
      color: var(--card-number);
    }

    /* Hover lift state — keeps the small upward affordance from Figma
       but no drop shadow (the design is flat). */
    .kapitel-card:hover .kapitel-card__main,
    .kapitel-card:focus .kapitel-card__main {
      transform: translateY(-4px);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 1100px) {
      .chapters-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-width: 760px;
        row-gap: 32px;
      }
    }
    @media (max-width: 900px) {
      .chapters-page { padding: 14px; }
      .chapters-title { font-size: 36px; }
      .chapters-subtitle { font-size: 14px; }
    }
    @media (max-width: 600px) {
      .chapters-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 480px;
        gap: 16px;
        row-gap: 24px;
      }
    }
    @media (max-width: 380px) {
      .chapters-grid {
        grid-template-columns: 1fr;
        max-width: 280px;
      }
    }
  </style>

  <link rel="stylesheet" href="css/tokens.css?v=12">
  <link rel="stylesheet" href="css/app.css?v=13">
  <link rel="stylesheet" href="css/nav.css?v=2">
</head>
<body>
  <div class="chapters-page">

    <!-- Top navigation — same DCT + burger pattern from Figma 750:596. -->
    <header class="site-nav">
      <a class="site-nav__logo" href="landing.html" aria-label="Forside">DCT</a>
      <button class="burger-btn" type="button" aria-label="Open menu">
        <img src="images/icons/menu-burger.svg" width="18" height="8" alt="" aria-hidden="true">
      </button>
    </header>

    <div class="chapters-header">
      <h1 class="chapters-title">Chapters</h1>
      <p class="chapters-subtitle">
        Choose a chapter to learn more about the danish story and set you up to success for the test
      </p>
    </div>

    <!-- Cards rendered by JS below from DANSK_CHAPTERS. -->
    <div class="chapters-grid" id="chaptersGrid"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="data/chapters.js?v=2"></script>
  <script src="js/progress.js?v=5"></script>
  <script src="js/menu.js?v=4"></script>

  <script>
    (function () {
      var grid = document.getElementById('chaptersGrid');
      if (!grid || !window.DANSK_CHAPTERS) return;

      function escapeHtml(str) {
        var d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // Wrap title onto two lines at the closest space to the centre
      // (matches Figma's "Danmarks <br> Historien" treatment).
      function wrapTitle(str) {
        if (!str) return '';
        var s = str.trim();
        if (s.indexOf(' ') === -1) return escapeHtml(s);
        var middle = Math.floor(s.length / 2);
        var left = s.lastIndexOf(' ', middle);
        var right = s.indexOf(' ', middle);
        var split = (left === -1) ? right
                  : (right === -1) ? left
                  : (middle - left <= right - middle) ? left : right;
        return escapeHtml(s.slice(0, split)) + '<br>' + escapeHtml(s.slice(split + 1));
      }

      var html = '';
      DANSK_CHAPTERS.forEach(function (ch) {
        var num = String(ch.number).padStart(2, '0');
        // Per-chapter portrait — Figma exported each as its own crop, so
        // we ship ch1.png … ch6.png and the CSS just stretches them to
        // fill the oval window (no scale/offset hackery needed).
        var img = 'images/chapters/ch' + ch.number + '.png';
        html +=
          '<a class="kapitel-card" href="study.html?chapter=' + ch.id + '" aria-label="Kapitel ' + num + ' — ' + escapeHtml(ch.titleDa) + '">' +
            '<div class="kapitel-card__main">' +
              '<div class="kapitel-card__portrait">' +
                '<img src="' + img + '" alt="" loading="lazy">' +
              '</div>' +
              '<div class="kapitel-card__title">' + wrapTitle(ch.titleDa) + '</div>' +
              '<div class="kapitel-card__label">Kapitel</div>' +
              '<div class="kapitel-card__number">' + num + '</div>' +
            '</div>' +
          '</a>';
      });
      grid.innerHTML = html;
    })();
  </script>
</body>
</html>
