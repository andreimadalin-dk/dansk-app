<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    /* ---------- PP Acma (self-hosted) ---------- */
    @font-face {
      font-family: 'PP Acma';
      font-weight: 600;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Semibold.otf') format('opentype'),
           url('fonts/PPAcma-Semibold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 900;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Black.otf') format('opentype'),
           url('fonts/PPAcma-Black.ttf') format('truetype');
    }

    :root {
      --bg: #fffaf5;
      --fg: #382626;
      /* STUDY disc — Figma 603:447 uses the dark brown #382626. */
      --brown: #382626;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { min-height: 100vh; overflow-x: hidden; }

    /* Mirrors Figma "Landingpage" (603:427) — vertical SPACE_BETWEEN with
       padding 20px on all sides. Nav up top, wheel center, footer bottom. */
    .landing {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      gap: 0;
    }

    /* ---------- Main (wheel) ---------- */
    .landing__main {
      width: 100%;
      flex: 1 1 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The wheel SVG (viewBox 0 0 754 727) is a 1:1 mirror of the
       Figma "Mid" group at node 424:100. Letters + cutouts live inside
       #wheelRing which rotates around (380, 335.85); the STUDY disc
       sits outside that group so it stays still. */
    .wheel-stage {
      position: relative;
      width: 100%;
      max-width: 754px;
      aspect-ratio: 754 / 727;
      margin: 0 auto;
    }
    .wheel-svg { display: block; width: 100%; height: 100%; }

    .wheel-svg .start-disc {
      fill: var(--brown);
      transition: transform 0.2s ease;
      transform-origin: 380px 335.85px;
    }
    .wheel-svg .start-link:hover .start-disc { transform: scale(1.04); }
    .wheel-svg .start-label {
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: 42px;
      fill: var(--bg);
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ---------- Footer ---------- */
    .landing__footer {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 0;
      font-family: 'Inter', 'SuisseIntl', sans-serif;
      font-weight: 400;
      font-size: 12px;
      line-height: 1;
      color: var(--fg);
    }
    .landing__footer > span { flex: 1 1 0; }
    .landing__footer > span:nth-child(1) { text-align: left; }
    .landing__footer > span:nth-child(2) { text-align: center; }
    .landing__footer > span:nth-child(3) { text-align: right; }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .landing { padding: 14px; }
      .wheel-stage { max-width: 92vw; }
      .landing__footer { font-size: 11px; }
    }
  </style>
  <link rel="stylesheet" href="css/tokens.css?v=12">
  <link rel="stylesheet" href="css/app.css?v=13">
  <link rel="stylesheet" href="css/nav.css?v=2">

  <!-- Wheel rotation (unchanged from previous revision). -->
  <script>
    (function () {
      var ring = document.getElementById('wheelRing');
      var startLink = document.querySelector('.start-link');
      if (!ring || !startLink) return;

      var prefersReduce = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduce) return;

      var NORMAL = 0.07;
      var HOVER  = 0.005;
      var LERP   = 0.05;

      var rotation = 0;
      var current = NORMAL;
      var target  = NORMAL;
      var lastT   = performance.now();
      var CX = 380, CY = 335.85;

      function tick(now) {
        var dt = Math.min(3, (now - lastT) / 16.6667);
        lastT = now;
        current += (target - current) * LERP * dt;
        rotation = (rotation + current * dt) % 360;
        ring.setAttribute('transform', 'rotate(' + rotation + ' ' + CX + ' ' + CY + ')');
        requestAnimationFrame(tick);
      }
      function slowDown() { target = HOVER; }
      function speedUp()  { target = NORMAL; }
      startLink.addEventListener('mouseenter', slowDown);
      startLink.addEventListener('mouseleave', speedUp);
      startLink.addEventListener('focus', slowDown);
      startLink.addEventListener('blur',  speedUp);
      requestAnimationFrame(tick);
    })();
  </script>
