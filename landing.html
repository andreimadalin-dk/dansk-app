<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danish Citizenship Test — Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---------- PP Acma (self-hosted) ---------- */
    @font-face {
      font-family: 'PP Acma';
      font-weight: 100;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Thin.otf') format('opentype'),
           url('fonts/PPAcma-Thin.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 300;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Light.otf') format('opentype'),
           url('fonts/PPAcma-Light.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Book.otf') format('opentype'),
           url('fonts/PPAcma-Book.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 500;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Medium.otf') format('opentype'),
           url('fonts/PPAcma-Medium.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 600;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Semibold.otf') format('opentype'),
           url('fonts/PPAcma-Semibold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 700;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Bold.otf') format('opentype'),
           url('fonts/PPAcma-Bold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'PP Acma';
      font-weight: 900;
      font-style: normal;
      font-display: swap;
      src: url('fonts/PPAcma-Black.otf') format('opentype'),
           url('fonts/PPAcma-Black.ttf') format('truetype');
    }

    :root {
      --bg: #fffaf5;
      --fg: #2d2a22;
      /* Warm taupe used for the central START disc — sampled from the
         Figma ellipse fill (#95785A). */
      --brown: #95785a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      min-height: 100vh;
      /* Mirrors the Figma "Landingpage" frame's vertical auto-layout
         (SPACE_BETWEEN, padding T17 R20 B16 L16). */
      padding: 17px 20px 16px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      gap: 0;
    }

    /* ---------- Header ----------
       Mirrors the Figma "Header" frame: horizontal auto-layout,
       SPACE_BETWEEN, top-aligned, full-width. Logo and Actions hug
       their content; the tagline sits between them at a fixed 479px
       width — same composition as the Figma frame. */
    .landing__header {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    /* Logo cluster */
    .logo {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding-left: 0;
    }

    .logo__text {
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: 65.123px;
      line-height: 0.81;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--fg);
      white-space: nowrap;
    }

    .logo__stack {
      position: relative;
      width: 14px;
      height: 51px; /* total stack height from Figma (17 → 68) */
      padding-top: 0;
      flex: 0 0 14px;
    }

    .logo__stack svg { display: block; }

    .logo__globe {
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 14px;
    }

    .logo__halves {
      position: absolute;
      top: 17.11px; /* 34.11 - 17 offset in Figma */
      left: 0;
      width: 14px;
      height: 14px;
    }

    .logo__dk {
      position: absolute;
      top: 37px; /* 54 - 17 offset in Figma */
      left: 0;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo__dk svg {
      position: absolute;
      inset: 0;
    }

    .logo__dk-text {
      position: relative;
      font-family: 'PP Acma', sans-serif;
      font-weight: 900;
      font-size: 6.5px;
      line-height: 1;
      color: var(--fg);
      letter-spacing: -0.02em;
      /* Optical centering: fonts sit above the baseline, nudge down slightly */
      transform: translateY(0.25px);
    }

    /* Tagline — Figma "Intro" text node: 18px Inter Semi Bold (was
       SuisseIntl in the design but that font isn't deployed; Inter Semi
       Bold is the closest available substitute and is used in the
       cleaned Figma file too). 479px fixed, three lines, leading-none. */
    .tagline {
      flex: 0 0 479px;
      width: 479px;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
      line-height: 1;
      color: var(--fg);
    }

    /* Right-side action cluster: auth widget + menu button.
       Figma "NAv" group is 86×36 — i.e. avatar(36) + gap(14) + menu(36). */
    .landing__actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Menu button — Figma: 36×36 dark circle. */
    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--fg);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .menu-btn svg {
      display: block;
    }

    /* Auth widget overrides — keep both states (the logged-out "Log
       ind" pill and the logged-in avatar) at the same 36×36 footprint
       as the menu button so the cluster reads as a single 86×36 unit. */
    .landing #authWidget .auth-widget__avatar {
      width: 36px;
      height: 36px;
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }
    .landing #authWidget .auth-widget__initials {
      color: var(--bg);
      font-weight: 600;
    }
    .landing #authWidget .btn--outlined.btn--sm {
      height: 36px;
      padding: 0 14px;
      font-size: 12px;
      border-width: 1.5px;
      border-color: var(--fg);
      color: var(--fg);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .landing #authWidget .btn--outlined.btn--sm:hover {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    /* ---------- Main (wheel) ---------- */
    .landing__main {
      width: 100%;
      flex: 1 1 0;          /* take up the middle of the page column */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The wheel is one self-contained SVG with viewBox 0 0 754 727 —
       a 1:1 mirror of the Figma "Mid" frame at node 424:100. Every
       child element is positioned in that local coordinate system,
       and the SVG scales as one unit via CSS so letters, cutouts,
       and the START disc stay locked to each other and to Figma. */
    .wheel-stage {
      position: relative;
      width: 100%;
      max-width: 754px;
      aspect-ratio: 754 / 727;
      margin: 0 auto;
    }

    .wheel-svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* START disc lives inside the SVG so it scales with everything else.
       The <a> wraps a <circle> + <text>, both styled here. */
    .wheel-svg .start-disc {
      fill: var(--brown);
      transition: transform 0.2s ease;
      transform-origin: 380px 335.85px;
    }
    .wheel-svg .start-link:hover .start-disc {
      transform: scale(1.04);
    }
    .wheel-svg .start-label {
      font-family: 'PP Acma', 'DM Serif Display', serif;
      font-weight: 600;
      font-size: 50.847px;
      fill: var(--bg);
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ---------- Footer ----------
       Mirrors the Figma "Footer" frame: horizontal auto-layout, three
       equal-FILL text columns, each owning its own alignment. */
    .landing__footer {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      line-height: 1;
      color: var(--fg);
    }

    .landing__footer > span {
      flex: 1 1 0;
    }
    .landing__footer > span:nth-child(1) { text-align: left; }
    .landing__footer > span:nth-child(2) { text-align: center; }
    .landing__footer > span:nth-child(3) { text-align: right; }

    /* ---------- Responsive ----------
       On narrow viewports the 479px tagline can't fit between Logo and
       Actions side-by-side, so the header re-flows into a 2-row layout:
       Logo + Actions on top, tagline below. The wheel itself scales
       smoothly via aspect-ratio + viewBox. */
    @media (max-width: 900px) {
      .landing {
        padding: 12px;
        gap: 12px;
        justify-content: flex-start;
      }
      .landing__header {
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      .landing__actions { gap: 10px; }
      .tagline {
        flex: 1 1 100%;
        order: 99;             /* push to second row */
        width: auto;
        font-size: 13px;
      }
      .logo__text { font-size: 44px; }
      .menu-btn { width: 32px; height: 32px; }
      .landing #authWidget .auth-widget__avatar {
        width: 32px;
        height: 32px;
      }
      .landing #authWidget .btn--outlined.btn--sm {
        height: 32px;
        padding: 0 12px;
        font-size: 11px;
      }
      .wheel-stage { max-width: 92vw; }
      .landing__footer { font-size: 11px; }
    }
  </style>
  <!-- Loaded AFTER inline styles so app.css can provide btn/modal/auth-widget
       classes, but all landing-specific layout (.landing, .menu-btn, .tagline,
       .logo, wheel) is defined above and not overridden. -->
  <link rel="stylesheet" href="css/tokens.css?v=12">
  <link rel="stylesheet" href="css/app.css?v=12">
</head>
<body>
  <div class="landing">

    <!-- Header -->
    <header class="landing__header">
      <div class="logo">
        <div class="logo__text">DCT</div>
        <div class="logo__stack" aria-hidden="true">
          <!-- Globe icon (top) -->
          <svg class="logo__globe" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#globeClip)">
              <circle cx="7" cy="7" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M7 0.328125C7.31428 0.328125 7.63942 0.472462 7.96387 0.786133C8.2899 1.10133 8.59896 1.57301 8.86523 2.18164C9.39736 3.39794 9.73438 5.10132 9.73438 7C9.73438 8.89868 9.39736 10.6021 8.86523 11.8184C8.59896 12.427 8.2899 12.8987 7.96387 13.2139C7.63942 13.5275 7.31428 13.6719 7 13.6719C6.68572 13.6719 6.36058 13.5275 6.03613 13.2139C5.7101 12.8987 5.40104 12.427 5.13477 11.8184C4.60264 10.6021 4.26562 8.89868 4.26562 7C4.26562 5.10132 4.60264 3.39794 5.13477 2.18164C5.40104 1.57301 5.7101 1.10133 6.03613 0.786133C6.36058 0.472462 6.68572 0.328125 7 0.328125Z" stroke="#2D2A22" stroke-width="0.65625"/>
              <path d="M0.21875 7H13.5625" stroke="#2D2A22" stroke-width="0.65625"/>
              <circle cx="7" cy="17.0625" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
              <circle cx="7" cy="-3.0625" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
            </g>
            <defs>
              <clipPath id="globeClip">
                <rect width="14" height="14" rx="7" fill="white"/>
              </clipPath>
            </defs>
          </svg>

          <!-- Two-half composition: outlined dome (top) + filled dome flipped (bottom) -->
          <svg class="logo__halves" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 0.388672C10.5207 0.388672 13.3974 3.14106 13.5986 6.61133H0.401367C0.602589 3.14106 3.47928 0.388672 7 0.388672Z" stroke="#2D2A22" stroke-width="0.777778"/>
            <path d="M7 14C3.13401 14 0 10.866 0 7H14C14 10.866 10.866 14 7 14Z" fill="#2D2A22"/>
          </svg>

          <!-- DK circle (bottom) -->
          <div class="logo__dk">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
              <circle cx="7" cy="7" r="6.67188" stroke="#2D2A22" stroke-width="0.65625"/>
            </svg>
            <span class="logo__dk-text">DK</span>
          </div>
        </div>
      </div>

      <p class="tagline">
        Practice for the Danish citizenship test at your own pace. Build your knowledge, grow your confidence — one step at a time.
      </p>

      <div class="landing__actions">
        <!-- auth.js injects either a "Log ind" pill or the avatar dropdown here -->
        <div id="authWidget"></div>

        <button class="menu-btn" aria-label="Open menu" type="button">
          <svg width="14" height="10" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="1" x2="20" y2="1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="0" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="0" y1="13" x2="20" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main wheel: rebuilt from Figma node 424:100 ("Mid" group).
         viewBox 0 0 754 727 = the exact Mid frame size. Every child
         uses Mid-relative coordinates, so this SVG is a 1:1 mirror of
         the Figma group. The letter ring is a single SVG asset
         exported from Figma (only 11 glyphs, not the full alphabet —
         that's what the design has). Decoration cutouts and START
         disc sit on top. -->
    <main class="landing__main">
      <div class="wheel-stage">
        <svg class="wheel-svg"
             viewBox="0 0 754 727"
             preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg"
             role="img"
             aria-label="Danish Citizenship Test — start">
          <defs>
            <!-- Clip shapes mirroring each Figma cutout's outer fill.
                 All are defined around (0, 0) so an outer <g> translate
                 places them. Pills use rx = min(w,h)/2; rect-only clips
                 use no rx. image15 has an asymmetric profile (12.027
                 top corners, 44.5 bottom corners — a half-circle bottom
                 with an almost-square top) so it gets a custom path. -->
            <clipPath id="clip14"><rect x="-37.5" y="-46"   width="75"  height="92"  rx="37.5" /></clipPath>
            <clipPath id="clip20"><rect x="-43.5" y="-50"   width="87"  height="100" rx="43.5" /></clipPath>
            <clipPath id="clip21"><rect x="-40"   y="-45.5" width="80"  height="91"  rx="40"   /></clipPath>
            <clipPath id="clip22"><rect x="-45.5" y="-66.5" width="91"  height="133" rx="45.5" /></clipPath>
            <clipPath id="clip13"><rect x="-42"   y="-54.5" width="84"  height="109" rx="42"   /></clipPath>
            <clipPath id="clip11"><rect x="-39"   y="-49.5" width="78"  height="99"  rx="39"   /></clipPath>
            <clipPath id="clip24"><rect x="-60.5" y="-23"   width="121" height="46"  /></clipPath>
            <clipPath id="clip25"><rect x="-58.42" y="-18.6" width="116.84" height="37.19" /></clipPath>
            <clipPath id="clip15">
              <path d="M -32.473 -55.5
                       L 32.473 -55.5
                       A 12.027 12.027 0 0 1 44.5 -43.473
                       L 44.5 11
                       A 44.5 44.5 0 0 1 -44.5 11
                       L -44.5 -43.473
                       A 12.027 12.027 0 0 1 -32.473 -55.5 Z" />
            </clipPath>
          </defs>

          <!-- Letter ring: a single SVG asset that holds the 11 glyphs
               Figma actually drew. Positioned exactly per Figma:
               x=31.15, y=7.6, size 702.288 × 704.351. -->
          <image href="images/landing/letters.svg"
                 x="31.15" y="7.6"
                 width="702.288" height="704.351"
                 preserveAspectRatio="xMidYMid meet" />

          <!-- Decorative cutouts. Each <g> translates to the wrapper
               centre (Figma coord minus the Mid origin) and rotates,
               then a second <g clip-path="..."> holds the photo. The
               photo is positioned/sized to the FIGMA inner-image
               offset+scale so only the intended crop is visible — this
               is the "image inside a rounded mask" pattern Figma uses. -->

          <!-- image10 — plain crop, no clip, no inner offset -->
          <g transform="translate(226 85.44) rotate(-30)">
            <image href="images/landing/image10.png" x="-32" y="-44.5" width="64" height="89"/>
          </g>

          <!-- image14 (HC Andersen) — circular pill, no inner offset -->
          <g transform="translate(401.07 52.16) rotate(10.49)">
            <g clip-path="url(#clip14)">
              <image href="images/landing/image14.png" x="-37.5" y="-46" width="75" height="92"/>
            </g>
          </g>

          <!-- image20 (cat/crown) — pill clip; photo is 211% wide and
               offset 49.65% left so we see the right portion only. -->
          <g transform="translate(555.34 107.57) rotate(36.97)">
            <g clip-path="url(#clip20)">
              <image href="images/landing/image20.png" x="-86.7" y="-50.03" width="183.78" height="117.16"/>
            </g>
          </g>

          <!-- image21 (woman portrait) — circular pill; photo is 117%
               wide and offset 8.58% left. -->
          <g transform="translate(95.49 217.76) rotate(-49.3)">
            <g clip-path="url(#clip21)">
              <image href="images/landing/image21.png" x="-46.86" y="-46.62" width="93.6" height="93.62"/>
            </g>
          </g>

          <!-- image18 (rune compass) — plain 91×91, no clip, no rotation -->
          <g transform="translate(674.5 251.35)">
            <image href="images/landing/image18.png" x="-45.5" y="-45.5" width="91" height="91"/>
          </g>

          <!-- image22 (woman in fur) — pill clip; photo is 139% wide,
               92% tall, offset 19.57% left and 12.88% down — so only
               the lower portion of the source photo is visible. -->
          <g transform="translate(76.13 409.25) rotate(-105)">
            <g clip-path="url(#clip22)">
              <image href="images/landing/image22.png" x="-63.31" y="-49.37" width="126.61" height="123.01"/>
            </g>
          </g>

          <!-- image13 — pill clip; the source PNG is almost square
               (970×1008) while the display box is taller (84×109), so
               we need preserveAspectRatio="slice" to behave like
               Figma's object-cover (fill + crop) instead of meet
               (letterbox). -->
          <g transform="translate(689.59 447.24) rotate(107.41)">
            <g clip-path="url(#clip13)">
              <image href="images/landing/image13.png" x="-42" y="-54.5" width="84" height="109"
                     preserveAspectRatio="xMidYMid slice"/>
            </g>
          </g>

          <!-- image23 (white shape) — plain crop, no clip -->
          <g transform="translate(160.78 562.63) rotate(-135)">
            <image href="images/landing/image23.png" x="-48" y="-69.5" width="96" height="139"/>
          </g>

          <!-- image24 (column / pillar) — plain rectangular crop;
               photo is 147% tall and offset -63% UP, exposing only a
               horizontal strip near the bottom of the source. -->
          <g transform="translate(600.61 576.04) rotate(45.63)">
            <g clip-path="url(#clip24)">
              <image href="images/landing/image24.png" x="-57.4" y="-52.38" width="121" height="67.97"/>
            </g>
          </g>

          <!-- image25 (second pillar — same source as image24, smaller
               and at a different rotation, with its own crop). -->
          <g transform="translate(613.25 558.66) rotate(15.53)">
            <g clip-path="url(#clip25)">
              <image href="images/landing/image24.png" x="-79.21" y="-12.76" width="159.65" height="89.83"/>
            </g>
          </g>

          <!-- image15 (man in armour) — ASYMMETRIC clip (rounded
               bottom + small top corners); photo is 110% in both axes,
               offset -8.22% left and -1.49% up. -->
          <g transform="translate(472.74 661) rotate(163.11)">
            <g clip-path="url(#clip15)">
              <image href="images/landing/image15.png" x="-51.82" y="-57.15" width="98.66" height="123.04"/>
            </g>
          </g>

          <!-- image11 (man with white ruff) — pill clip, no inner offset -->
          <g transform="translate(297.88 663.57) rotate(-150)">
            <g clip-path="url(#clip11)">
              <image href="images/landing/image11.png" x="-39" y="-49.5" width="78" height="99"/>
            </g>
          </g>

          <!-- START disc, clickable. Center matches Figma exactly:
               disc at (380, 335.85), 102px radius. -->
          <a class="start-link" href="index.html" aria-label="Start the Danish Citizenship Test experience">
            <circle class="start-disc" cx="380" cy="335.85" r="102" />
            <text class="start-label" x="380" y="354" text-anchor="middle">START</text>
          </a>
        </svg>
      </div>
    </main>

    <!-- Footer — three equal-FILL columns matching the cleaned Figma. -->
    <footer class="landing__footer">
      <span>Little Studio</span>
      <span>Danish Citizenship test</span>
      <span>©2026</span>
    </footer>
  </div>

  <!-- Auth: Firebase SDK + project config + progress + auth widget. Loaded
       here (not in the head) so the wheel paints first; auth.js attaches
       to #authWidget once onAuthStateChanged fires. The wheel itself is
       a static SVG above — no JS needed for layout. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/progress.js?v=3"></script>
